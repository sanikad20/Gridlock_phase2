name: Keep Render API Awake
on:
  schedule:
    # Runs every 10 minutes. GitHub may delay this slightly under load —
    # that's fine, Render's free-tier spin-down window is ~15 minutes.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab to test
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://gridlock-api-xwmt.onrender.com/health)
          echo "API health check responded with status: $response"
          if [ "$response" -ne 200 ]; then
            echo "::warning::API health check did not return 200 (got $response)"
          fi
      - name: Ping Dashboard
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://gridlock-dashboard-xwmt.onrender.com)
          echo "Dashboard responded with status: $response"
          if [ "$response" -ne 200 ]; then
            echo "::warning::Dashboard did not return 200 (got $response)"
          fi
